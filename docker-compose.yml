version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: blossom_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blossom_transactions
      MYSQL_USER: blossom_user
      MYSQL_PASSWORD: blossom_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - blossom_network

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: blossom_backend
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: blossom_transactions
      DB_USER: blossom_user
      DB_PASS: blossom_pass
    networks:
      - blossom_network

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: blossom_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - blossom_network

networks:
  blossom_network:
    driver: bridge

volumes:
  db_data: